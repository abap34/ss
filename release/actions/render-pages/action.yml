name: Render ss slides for GitHub Pages
description: Render .ss slide decks to PDF with the ss render container and upload a GitHub Pages artifact.

inputs:
  image:
    description: Prebuilt ss render image to run.
    required: false
    default: ghcr.io/yuchi/ss-render:v0
  input:
    description: Newline- or comma-separated glob patterns for .ss files.
    required: false
    default: slides/**/*.ss
  out-dir:
    description: Directory to populate and upload as the Pages artifact.
    required: false
    default: _site
  pdf-dir:
    description: Directory under out-dir where rendered PDFs are written.
    required: false
    default: slides
  title:
    description: Title for the generated index.html.
    required: false
    default: Slides
  asset-base-dir:
    description: Optional asset base directory passed to ss check/render.
    required: false
    default: ""
  clean:
    description: Remove out-dir before rendering.
    required: false
    default: "true"
  check:
    description: Run ss check before rendering each source.
    required: false
    default: "true"
  write-dump:
    description: Write dump JSON files next to rendered PDFs.
    required: false
    default: "false"
  configure-pages:
    description: Run actions/configure-pages before uploading the artifact.
    required: false
    default: "true"
  upload-artifact:
    description: Upload out-dir with actions/upload-pages-artifact.
    required: false
    default: "true"

outputs:
  out-dir:
    description: The populated Pages artifact directory.
    value: ${{ inputs.out-dir }}

runs:
  using: composite
  steps:
    - name: Configure Pages
      if: ${{ inputs.configure-pages == 'true' }}
      uses: actions/configure-pages@v5

    - name: Render ss slides
      shell: bash
      env:
        SS_RENDER_IMAGE: ${{ inputs.image }}
        SS_INPUT: ${{ inputs.input }}
        SS_OUT_DIR: ${{ inputs.out-dir }}
        SS_PDF_DIR: ${{ inputs.pdf-dir }}
        SS_INDEX_TITLE: ${{ inputs.title }}
        SS_ASSET_BASE_DIR: ${{ inputs.asset-base-dir }}
        SS_CLEAN: ${{ inputs.clean }}
        SS_CHECK: ${{ inputs.check }}
        SS_WRITE_DUMP: ${{ inputs.write-dump }}
      run: |
        set -euo pipefail
        docker pull "$SS_RENDER_IMAGE"
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e SS_INPUT \
          -e SS_OUT_DIR \
          -e SS_PDF_DIR \
          -e SS_INDEX_TITLE \
          -e SS_ASSET_BASE_DIR \
          -e SS_CLEAN \
          -e SS_CHECK \
          -e SS_WRITE_DUMP \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          -w /workspace \
          "$SS_RENDER_IMAGE"

    - name: Upload Pages artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-pages-artifact@v4
      with:
        path: ${{ inputs.out-dir }}
