name: Render smoke

on:
  pull_request:
    paths:
      - ".github/workflows/render-smoke.yml"
      - "release/docker/render/Dockerfile"
      - "build.zig"
      - "tests/smoke/render.sh"
      - "scripts/setup-md4c.sh"
      - "src/**"
      - "stdlib/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/render-smoke.yml"
      - "release/docker/render/Dockerfile"
      - "build.zig"
      - "tests/smoke/render.sh"
      - "scripts/setup-md4c.sh"
      - "src/**"
      - "stdlib/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0

jobs:
  render-smoke:
    name: Render smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore apt package cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/apt-archives
          key: ${{ runner.os }}-${{ runner.arch }}-apt-render-v1-${{ hashFiles('.github/workflows/render-smoke.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-apt-render-v1-

      - name: Install system dependencies
        run: |
          APT_ARCHIVE_CACHE="$RUNNER_TEMP/apt-archives"
          mkdir -p "$APT_ARCHIVE_CACHE/partial"
          sudo apt-get update
          sudo apt-get \
            -o Dir::Cache::archives="$APT_ARCHIVE_CACHE" \
            -o Binary::apt-get::APT::Keep-Downloaded-Packages=true \
            install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            imagemagick \
            libcairo2-dev \
            librsvg2-bin \
            librsvg2-dev \
            libpango1.0-dev \
            pkg-config \
            poppler-utils \
            qpdf \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-science \
            xz-utils
          sudo rm -rf "$APT_ARCHIVE_CACHE/partial" "$APT_ARCHIVE_CACHE/lock"
          sudo chown -R "$USER:$(id -gn)" "$APT_ARCHIVE_CACHE"

      - name: Restore Zig compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64-linux" ;;
            aarch64|arm64) zig_arch="aarch64-linux" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          mkdir -p "$HOME/.local/zig"
          if [ ! -x "$HOME/.local/zig/zig" ]; then
            curl --retry 5 --retry-delay 2 --connect-timeout 20 --max-time 300 -fsSL \
              "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" \
              -o /tmp/zig.tar.xz
            tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          fi
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Restore MD4C cache
        uses: actions/cache@v4
        with:
          path: third_party/md4c
          key: ${{ runner.os }}-md4c-${{ hashFiles('scripts/setup-md4c.sh') }}

      - name: Set up MD4C
        run: scripts/setup-md4c.sh

      - name: Show tool versions
        run: |
          zig version
          pkg-config --modversion pangocairo
          pkg-config --modversion librsvg-2.0
          pdflatex --version | head -n 1
          qpdf --version | head -n 1

      - name: Render smoke test
        run: |
          zig build
          tests/smoke/render.sh
