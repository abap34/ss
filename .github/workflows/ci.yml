name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0

jobs:
  test:
    name: Zig build test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            imagemagick \
            libcairo2-dev \
            librsvg2-dev \
            librsvg2-bin \
            libpango1.0-dev \
            poppler-utils \
            pkg-config \
            qpdf \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            xz-utils

      - name: Install Zig
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64-linux" ;;
            aarch64|arm64) zig_arch="aarch64-linux" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          curl --retry 5 --retry-delay 2 --connect-timeout 20 --max-time 300 -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          mkdir -p "$HOME/.local/zig"
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Set up MD4C
        run: scripts/setup-md4c.sh

      - name: Show tool versions
        run: |
          zig version
          pkg-config --modversion pangocairo
          pkg-config --modversion librsvg-2.0
          git -C third_party/md4c rev-parse HEAD

      - name: Run tests
        run: zig build test

      - name: Render smoke test
        run: |
          zig build
          scripts/render-smoke.sh
