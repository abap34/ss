name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0

jobs:
  test:
    name: Zig build test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore apt package cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/apt-archives
          key: ${{ runner.os }}-${{ runner.arch }}-apt-ci-v1-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-apt-ci-v1-

      - name: Install system dependencies
        run: |
          if command -v pkg-config >/dev/null && pkg-config --exists cairo pangocairo librsvg-2.0; then
            echo "system dependencies already installed"
          else
            APT_ARCHIVE_CACHE="$RUNNER_TEMP/apt-archives"
            mkdir -p "$APT_ARCHIVE_CACHE/partial"
            sudo apt-get update
            sudo apt-get \
              -o Dir::Cache::archives="$APT_ARCHIVE_CACHE" \
              -o Binary::apt-get::APT::Keep-Downloaded-Packages=true \
              install -y --no-install-recommends \
              libcairo2-dev \
              librsvg2-dev \
              libpango1.0-dev \
              pkg-config
          fi
          if [ -d "$RUNNER_TEMP/apt-archives" ]; then
            sudo rm -rf "$RUNNER_TEMP/apt-archives/partial" "$RUNNER_TEMP/apt-archives/lock"
            sudo chown -R "$USER:$(id -gn)" "$RUNNER_TEMP/apt-archives"
          fi

      - name: Restore Zig compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64-linux" ;;
            aarch64|arm64) zig_arch="aarch64-linux" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          mkdir -p "$HOME/.local/zig"
          if [ ! -x "$HOME/.local/zig/zig" ]; then
            curl --retry 5 --retry-delay 2 --connect-timeout 20 --max-time 300 -fsSL \
              "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" \
              -o /tmp/zig.tar.xz
            tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          fi
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Restore MD4C cache
        uses: actions/cache@v4
        with:
          path: third_party/md4c
          key: ${{ runner.os }}-md4c-${{ hashFiles('scripts/setup-md4c.sh') }}

      - name: Set up MD4C
        run: scripts/setup-md4c.sh

      - name: Show tool versions
        run: |
          zig version
          pkg-config --modversion pangocairo
          pkg-config --modversion librsvg-2.0
          git -C third_party/md4c rev-parse HEAD

      - name: Run tests
        run: zig build test
