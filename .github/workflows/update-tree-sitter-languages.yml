name: Update bundled tree-sitter languages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Sync upstream grammars
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/tree-sitter-ss/package-lock.json

      - name: Install tree-sitter CLI
        run: npm ci --prefix editor/tree-sitter-ss

      - name: Sync bundled grammars
        run: node scripts/update-tree-sitter-languages.mjs --latest

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- third_party/tree-sitter-languages; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="automation/tree-sitter-languages"
          title="Update bundled tree-sitter languages"
          body_file="$RUNNER_TEMP/tree-sitter-update-body.md"

          cat > "$body_file" <<'BODY'
          Updates bundled tree-sitter parsers and highlight queries from upstream HEAD commits.

          Generated by `scripts/update-tree-sitter-languages.mjs --latest`.
          BODY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add third_party/tree-sitter-languages
          git commit -m "$title"
          git push --force origin "$branch"

          existing="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body-file "$body_file"
          else
            gh pr create --head "$branch" --base main --title "$title" --body-file "$body_file"
          fi
