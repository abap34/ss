name: Publish VS Code extension

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIG_VERSION: 0.16.0

jobs:
  publish-vscode:
    name: Validate, package, and publish VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            libcairo2-dev \
            librsvg2-dev \
            libpango1.0-dev \
            pkg-config \
            xz-utils

      - name: Restore Zig compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64-linux" ;;
            aarch64|arm64) zig_arch="aarch64-linux" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          mkdir -p "$HOME/.local/zig"
          if [ ! -x "$HOME/.local/zig/zig" ]; then
            curl --retry 5 --retry-delay 2 --connect-timeout 20 --max-time 300 -fsSL \
              "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" \
              -o /tmp/zig.tar.xz
            tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          fi
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Restore MD4C cache
        uses: actions/cache@v4
        with:
          path: third_party/md4c
          key: ${{ runner.os }}-md4c-${{ hashFiles('scripts/setup-md4c.sh') }}

      - name: Set up MD4C
        run: scripts/setup-md4c.sh

      - name: Check release metadata
        run: release/tools/preflight.py "$GITHUB_REF_NAME"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            editor/vscode/package-lock.json
            editor/tree-sitter-ss/package-lock.json

      - name: Validate Zig and LSP
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          zig build test
          zig build -Doptimize=ReleaseSafe -Dversion="$release_version" -Dcommit="$GITHUB_SHA"
          zig-out/bin/ss --version
          tests/smoke/project.sh
          node tests/smoke/lsp.mjs

      - name: Test tree-sitter grammar
        working-directory: editor/tree-sitter-ss
        run: |
          npm ci
          npm test

      - name: Package VS Code extension
        working-directory: editor/vscode
        run: |
          npm ci
          npm run compile
          npm run package -- --out "ss-language-support-${GITHUB_REF_NAME}.vsix" --allow-missing-repository --skip-license

      - name: Publish to Marketplace
        working-directory: editor/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "${VSCE_PAT:-}" ]; then
            npx vsce publish --packagePath "ss-language-support-${GITHUB_REF_NAME}.vsix" -p "$VSCE_PAT" --allow-missing-repository --skip-license
          else
            echo "VSCE_PAT is not configured; skipping Marketplace publish."
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss-language-support-vsix
          path: editor/vscode/ss-language-support-${{ github.ref_name }}.vsix

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VSIX: editor/vscode/ss-language-support-${{ github.ref_name }}.vsix
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if gh release view "$TAG_NAME" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "release $TAG_NAME was not created by the source archive workflow" >&2
              exit 1
            fi
            sleep 10
          done
          gh release upload "$TAG_NAME" "$VSIX" --clobber
