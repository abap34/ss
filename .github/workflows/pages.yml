name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        run: |
          mkdir -p _site
          cp tools/layout-trace-viewer.html _site/index.html
          cp tools/layout-trace-viewer.html _site/layout-trace-viewer.html

      - name: Upload static files
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
